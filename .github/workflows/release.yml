name: Release Obsidian Plugin

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create release assets
        run: |
          mkdir -p dist
          cp main.js manifest.json styles.css dist/
          cd dist
          zip -r gemini-research-brain.zip main.js manifest.json styles.css

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
            dist/gemini-research-brain.zip
